<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Add Stock</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100 min-h-screen flex items-center justify-center">

<div class="w-full max-w-xl bg-white rounded-2xl shadow-lg p-6">
    <h2 class="text-xl font-bold text-slate-800 mb-6">Add Stock</h2>

    {% if messages %}
        {% for message in messages %}
            <div class="mb-4 p-3 rounded text-white 
                {% if message.tags == 'success' %}bg-green-600{% else %}bg-red-600{% endif %}">
                {{ message }}
            </div>
        {% endfor %}
    {% endif %}

    <form method="POST" class="space-y-4">
        {% csrf_token %}

        <div>
            <label class="block text-sm font-medium text-slate-700">Product Name</label>
            <input type="text" name="product_name" required
                   class="mt-1 w-full rounded-lg border border-slate-300 px-3 py-2 focus:ring-indigo-500 focus:border-indigo-500">
        </div>

        <div>
            <label class="block text-sm font-medium text-slate-700">Quantity</label>
            <input type="number" name="quantity" min="1" required
                   class="mt-1 w-full rounded-lg border border-slate-300 px-3 py-2 focus:ring-indigo-500 focus:border-indigo-500">
        </div>

        <div class="flex justify-end gap-3">
            <a href="{% url 'company_dashboard' %}"
               class="px-4 py-2 rounded-lg bg-slate-200 hover:bg-slate-300">Cancel</a>
            <button type="submit"
                    class="px-4 py-2 rounded-lg bg-indigo-600 text-white hover:bg-indigo-700">
                Save Stock
            </button>
        </div>
    </form>
</div>

</body>
</html>
