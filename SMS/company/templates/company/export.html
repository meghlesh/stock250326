<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Export Data</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-slate-100 min-h-screen flex items-center justify-center">

    <div class="w-full max-w-lg bg-white rounded-2xl shadow-lg p-6 text-center">
        <h2 class="text-xl font-bold text-slate-800 mb-4">Export Data</h2>

        <p class="text-sm text-slate-600 mb-6">
            Click below to export company data.
        </p>

<form method="GET" action="{% url 'export_data_download' %}">
    <button type="submit" class="px-6 py-3 rounded-lg bg-indigo-600 text-white hover:bg-indigo-700">
        Export Now
    </button>
</form>

        <div class="mt-4">
            <a href="{% url 'company_dashboard' %}" class="text-sm text-slate-500 hover:underline">Back to Dashboard</a>
        </div>
    </div>

</body>

</html>
