<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Owner Login | Business Portal</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
        }
        .animate-fade-in {
            animation: fadeIn 0.6s ease-out forwards;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="flex items-center justify-center p-6">

    <div class="w-full max-w-md animate-fade-in">
        <!-- Branding -->
        <div class="text-center mb-8">
            <div class="inline-flex items-center justify-center w-16 h-16 bg-white rounded-2xl mb-4 shadow-xl">
                <i class="fas fa-briefcase text-indigo-600 text-3xl"></i>
            </div>
            <h1 class="text-3xl font-bold text-white tracking-tight">Business Login</h1>
            <p class="text-indigo-100 mt-2 opacity-90">Manage your company resources</p>
        </div>

        <!-- Login Card -->
        <div class="glass-card rounded-3xl p-8 md:p-10">
            
            <!-- Django Messages -->
            {% if messages %}
            <div id="django-messages" class="mb-6 space-y-2">
                {% for message in messages %}
                <div class="message-item p-3 rounded-lg text-sm flex items-center gap-2
                    {% if message.tags == 'error' %}
                        bg-red-50 text-red-700
                    {% else %}
                        bg-green-50 text-green-700
                    {% endif %}">
                    <i class="fas {% if message.tags == 'error' %}fa-circle-xmark{% else %}fa-circle-check{% endif %}"></i>
                    {{ message }}
                </div>
                {% endfor %}
            </div>
            {% endif %}

            <form method="post" class="space-y-6" onsubmit="return validateLoginForm()">
                {% csrf_token %}
                
                <!-- Username -->
                <div class="space-y-2">
                    <label class="block text-sm font-semibold text-gray-700">Username</label>
                    <div class="relative group">
                        <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-gray-400 group-focus-within:text-indigo-600 transition-colors">
                            <i class="fas fa-user-tie"></i>
                        </div>
                        <input 
                            type="text" 
                            name="username"
                            id="username"
                            maxlength="30"
                            required
                            oninput="validateUsername(this)"
                            class="block w-full pl-11 pr-4 py-3 bg-gray-50 border border-gray-200 rounded-xl
                                   text-gray-900 placeholder-gray-400 focus:outline-none focus:ring-2
                                   focus:ring-indigo-500 focus:bg-white transition-all"
                            placeholder="Enter your username"
                        />
                        <p id="username_error" class="text-red-600 text-sm mt-1 hidden"></p>
                    </div>
                </div>

                <!-- Password -->
                <div class="space-y-2">
                    <div class="flex items-center justify-between">
                        <label class="block text-sm font-semibold text-gray-700">Password</label>
                        <a href="#" class="text-xs font-bold text-indigo-600 hover:text-indigo-800 transition-colors">Recover?</a>
                    </div>
                    <div class="relative group">
                        <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-gray-400 group-focus-within:text-indigo-600 transition-colors">
                            <i class="fas fa-key"></i>
                        </div>
                        <input 
                            type="password" 
                            name="password"
                            id="ownerPass"
                            maxlength="20"
                            required
                            class="block w-full pl-11 pr-12 py-3 bg-gray-50 border border-gray-200 rounded-xl
                                   text-gray-900 placeholder-gray-400 focus:outline-none focus:ring-2
                                   focus:ring-indigo-500 focus:bg-white transition-all"
                            placeholder="••••••••"
                        />
                        <!-- Eye Toggle Button -->
                        <button type="button" onclick="togglePass()" class="absolute inset-y-0 right-0 pr-4 flex items-center text-gray-400 hover:text-indigo-600 z-10">
                            <i class="far fa-eye" id="toggleIcon"></i>
                        </button>
                    </div>
                </div>

                <!-- Login Options -->
                <div class="flex items-center justify-between text-sm">
                    <label class="flex items-center cursor-pointer text-gray-600">
                        <input type="checkbox" name="remember_me" class="w-4 h-4 rounded border-gray-300 text-indigo-600 focus:ring-indigo-500">
                        <span class="ml-2">Remember me</span>
                    </label>
                </div>

                <!-- Submit -->
                <button 
                    type="submit" 
                    class="w-full py-4 bg-indigo-600 text-white font-bold rounded-xl shadow-lg shadow-indigo-200 hover:bg-indigo-700 hover:shadow-indigo-300 transition-all active:scale-[0.98] flex items-center justify-center gap-2"
                >
                    Sign In to Portal <i class="fas fa-arrow-right text-xs"></i>
                </button>
            </form>
        </div>

        <!-- Links -->
        <div class="mt-8 flex flex-col items-center gap-4">
            <a href="/" class="text-white/80 hover:text-white text-sm font-medium transition-colors">
                <i class="fas fa-house mr-1"></i> Return to Homepage
            </a>
            <p class="text-indigo-100/60 text-xs">
                &copy; 2025 Enterprise Solutions. All rights reserved.
            </p>
        </div>
    </div>

    <script>
        // Fixed Eye Toggle Function
        function togglePass() {
            const input = document.getElementById('ownerPass');
            const icon = document.getElementById('toggleIcon');
            
            if (input.type === 'password') {
                input.type = 'text';
                icon.classList.remove('fa-eye');
                icon.classList.add('fa-eye-slash');
            } else {
                input.type = 'password';
                icon.classList.remove('fa-eye-slash');
                icon.classList.add('fa-eye');
            }
        }

        // Simple Username Validation (No spaces)
        function validateUsername(input) {
            const error = document.getElementById("username_error");

            if (/\s/.test(input.value)) {
                input.value = input.value.replace(/\s/g, "");
                error.textContent = "Username cannot contain spaces.";
                error.classList.remove("hidden");
                input.classList.add("border-red-500");
                return false;
            }

            error.classList.add("hidden");
            input.classList.remove("border-red-500");
            return true;
        }

        // Form Submission Validation
        function validateLoginForm() {
            const username = document.getElementById("username");
            // No longer validating password here as requested
            return validateUsername(username);
        }

        // Message Auto-hide
        document.addEventListener("DOMContentLoaded", function () {
            const messages = document.getElementById("django-messages");
            if (messages) {
                setTimeout(() => {
                    messages.style.transition = "opacity 0.5s ease";
                    messages.style.opacity = "0";
                    setTimeout(() => {
                        messages.remove();
                    }, 500);
                }, 4000);
            }
        });
    </script>

</body>
</html>
