<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>New Quote</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- Tailwind CSS -->
<script src="https://cdn.tailwindcss.com"></script>

<!-- Font Awesome -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<!-- Google Font -->
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
    body {
        font-family: 'Inter', sans-serif;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        min-height: 100vh;
    }
    .glass-card {
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(10px);
        border: 1px solid rgba(255, 255, 255, 0.2);
        box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1),
                    0 10px 10px -5px rgba(0,0,0,0.04);
    }
    .animate-up {
        animation: slideUp 0.5s ease-out forwards;
    }
    @keyframes slideUp {
        from { opacity: 0; transform: translateY(20px); }
        to { opacity: 1; transform: translateY(0); }
    }
</style>
</head>

<body class="p-6">

<div class="max-w-7xl mx-auto glass-card shadow rounded-md my-4 animate-up">

<!-- HEADER -->
<div class="flex justify-between items-center px-6 py-4 border-b">
  <div class="flex items-center gap-4">
    <h1 class="text-xl font-semibold">New Quote</h1>
    <div class="flex items-center gap-2 text-sm text-gray-600">
      <span>Use Simplified View</span>
      <input type="checkbox" class="accent-blue-600">
    </div>
  </div>
  <a href="{% url 'quote_list' %}" class="text-red-500 text-xl font-bold">✕</a>
</div>

<form method="POST" action="{% url 'quote_create' %}" enctype="multipart/form-data"
      class="px-6 py-6 space-y-8">
{% csrf_token %}

<!-- CUSTOMER -->
<!-- <div class="bg-gray-50 px-6 py-4 rounded-md"> -->
<div class="grid md:grid-cols-2 gap-6">
  <div class="flex flex-col md:flex-row md:items-center gap-3">
    <label class="w-40 text-sm font-medium text-red-600">Customer Name*</label>
    <select name="customer" required class="w-full h-9 border border-gray-300 rounded-md px-2 text-sm bg-white">
      <option value="">Select or add a customer</option>
      {% for customer in customers %}
        <option value="{{ customer.id }}">{{ customer.contact_name }}</option>
      {% endfor %}
    </select>
  </div>
</div>

<!-- QUOTE DETAILS -->
<div class="grid md:grid-cols-2 gap-6">
  <div class="flex flex-col md:flex-row md:items-center gap-2">
    <label class="w-40 text-sm font-medium text-red-600">Quote#*</label>
    <input name="quote_number" value="{{ quote_number }}" readonly
           class="w-full h-10 border rounded-md px-3 text-sm bg-gray-50">
  </div>

  <div class="flex flex-col md:flex-row md:items-center gap-2">
    <label class="w-40 text-sm font-medium">Reference#</label>
    <input name="reference" class="w-full h-10 border rounded-md px-3 text-sm">
  </div>

  <div class="flex flex-col md:flex-row md:items-center gap-2">
    <label class="w-40 text-sm font-medium text-red-600">Quote Date*</label>
    <input type="date" name="quote_date" required
           class="w-full h-10 border border-blue-500 rounded-md px-3 text-sm">
  </div>

  <div class="flex flex-col md:flex-row md:items-center gap-2">
    <label class="w-40 text-sm font-medium">Expiry Date</label>
    <input type="date" name="expiry_date" class="w-full h-10 border rounded-md px-3 text-sm">
  </div>
</div>

<hr>

<!-- SALES + PROJECT -->
<div class="grid md:grid-cols-2 gap-6">
  <div class="flex flex-col md:flex-row md:items-center gap-2">
    <label class="w-40 text-sm font-medium">Salesperson</label>
    <input name="salesperson" class="w-full h-10 border rounded-md px-3 text-sm">
  </div>

  <div class="flex flex-col md:flex-row md:items-center gap-2">
    <label class="w-40 text-sm font-medium">Project Name</label>
    <input name="project_name" class="w-full h-10 border rounded-md px-3 text-sm">
  </div>
</div>

<hr>

<!-- SUBJECT -->
<div class="flex flex-col md:flex-row md:items-start gap-2">
  <label class="w-40 text-sm font-medium">Subject <span class="text-gray-400">ⓘ</span></label>
  <textarea name="subject" rows="2"
            class="w-full border rounded-md px-3 py-2 text-sm"
            placeholder="Let your customer know what this Quote is for"></textarea>
</div>

<hr>

<!-- ITEM TABLE + TOTALS -->
<div class="grid grid-cols-1 lg:grid-cols-3 gap-6">

<!-- ITEM TABLE -->
<div class="lg:col-span-2 bg-gray-50 rounded-md p-4">
  <h3 class="font-medium mb-3">Item Table</h3>

  <div class="overflow-x-auto">
    <table class="w-full text-sm border">
      <thead class="bg-white">
        <tr>
          <th class="p-2 text-left">ITEM DETAILS</th>
          <th class="p-2 text-center">QUANTITY</th>
          <th class="p-2 text-center">RATE</th>
          <th class="p-2 text-right">AMOUNT</th>
          <th></th>
        </tr>
      </thead>
      <tbody id="itemTableBody">
        <tr class="bg-white">
          <td class="p-2">
            <select name="product[]" class="w-full border rounded">
              <option value="">Select Item</option>
              {% for product in products %}
                <option value="{{ product.id }}">{{ product.name }}</option>
              {% endfor %}
            </select>
          </td>
          <td class="p-2 text-center">
            <input name="quantity[]" value="1" class="border w-20 text-center">
          </td>
          <td class="p-2 text-center">
            <input name="rate[]" value="0" class="border w-20 text-center">
          </td>
          <td class="p-2 text-right font-semibold">0.00</td>
          <td class="p-2 text-center text-red-500 cursor-pointer remove-row">✕</td>
        </tr>
      </tbody>
    </table>
  </div>

  <div class="flex flex-wrap gap-3 mt-2">
    <button type="button" id="addRowBtn" class="bg-white border rounded px-3 py-1 text-sm hover:bg-gray-100">
      ➕ Add New Row
    </button>
    <button type="button" id="bulkAddBtn" class="bg-white border rounded px-3 py-1 text-sm hover:bg-gray-100">
      ➕ Add Items in Bulk
    </button>
  </div>
</div>

<!-- TOTALS -->
<div class="bg-gray-50 p-6 rounded-lg space-y-5 text-sm shadow-sm self-start">
  <div class="flex justify-between font-medium">
    <span class="text-gray-700">Sub Total</span>
    <span>0.00</span>
  </div>

  <div class="flex justify-between items-center">
    <span class="text-gray-700">Discount</span>
    <div class="flex items-center">
      <input name="discount" value="0" class="border w-16 h-9 text-center rounded-l-md">
      <span class="border h-9 px-3 flex items-center rounded-r-md bg-white">%</span>
    </div>
  </div>

  <div class="space-y-2">
    <div class="flex gap-6 items-center">
      <label class="flex items-center gap-2">
        <input type="radio" name="tax_type" value="tds" checked> TDS
      </label>
      <label class="flex items-center gap-2">
        <input type="radio" name="tax_type" value="tcs"> TCS
      </label>
    </div>
    <select name="tax" class="w-full border rounded-md px-3 py-2 text-sm">
      <option>Select a Tax</option>
    </select>
  </div>

  <div class="flex justify-between font-semibold text-lg border-t pt-4">
    <span>Total (₹)</span>
    <span>0.00</span>
  </div>
</div>

</div>

<hr>

<!-- NOTES -->
<div class="grid md:grid-cols-2 gap-6">
  <div>
    <label class="text-sm font-medium block mb-1">Customer Notes</label>
    <textarea name="customer_notes" class="w-full border rounded-md px-3 py-2 text-sm">
Looking forward for your business.
    </textarea>
  </div>

  <div>
    <label class="text-sm font-medium block mb-1">Terms & Conditions</label>
    <textarea name="terms" class="w-full border rounded-md px-3 py-2 text-sm"
      placeholder="Enter the terms and conditions of your business to be displayed in your transaction"></textarea>
  </div>
</div>

<hr>

<!-- ATTACH FILES -->
<div class="bg-gray-50 rounded-md p-4 space-y-3">
  <label class="text-sm font-medium flex items-center gap-2">
    <i class="fa-solid fa-paperclip text-gray-600"></i> Attach File(s) to Quote
  </label>

  <input type="file" name="attachments" multiple
         class="block w-full text-sm text-gray-600
                file:mr-4 file:py-2 file:px-4
                file:rounded-md file:border-0
                file:text-sm file:font-semibold
                file:bg-indigo-50 file:text-indigo-700
                hover:file:bg-indigo-100 cursor-pointer">

  <p class="text-xs text-gray-500">
    You can attach PDFs, images, or documents (multiple files allowed).
  </p>
</div>

<hr>

<!-- FOOTER -->
<div class="flex flex-col md:flex-row justify-between items-center pt-6 gap-4">
  <div class="flex flex-wrap gap-3">
    <button name="status" value="draft" class="border rounded px-4 py-2">
      Save as Draft
    </button>
    <button name="status" value="sent"
      class="bg-blue-600 text-white rounded px-4 py-2">
      Save and Send
    </button>
    <a href="{% url 'quote_list' %}" class="border rounded px-4 py-2">
      Cancel
    </a>
  </div>
</div>

</form>
</div>

<!-- JS FOR ADD / REMOVE ROWS -->
<script>
const tableBody = document.getElementById("itemTableBody");
const addRowBtn = document.getElementById("addRowBtn");
const bulkAddBtn = document.getElementById("bulkAddBtn");

// ➕ Add New Row
addRowBtn.addEventListener("click", () => {
  const row = document.createElement("tr");
  row.className = "bg-white";
  row.innerHTML = `
    <td class="p-2">
      <select name="product[]" class="w-full border rounded">
        <option value="">Select Item</option>
        {% for product in products %}
          <option value="{{ product.id }}">{{ product.name }}</option>
        {% endfor %}
      </select>
    </td>
    <td class="p-2 text-center">
      <input name="quantity[]" value="1" class="border w-20 text-center">
    </td>
    <td class="p-2 text-center">
      <input name="rate[]" value="0" class="border w-20 text-center">
    </td>
    <td class="p-2 text-right font-semibold">0.00</td>
    <td class="p-2 text-center text-red-500 cursor-pointer remove-row">✕</td>
  `;
  tableBody.appendChild(row);
});

// ❌ Remove Row
tableBody.addEventListener("click", (e) => {
  if (e.target.classList.contains("remove-row")) {
    e.target.closest("tr").remove();
  }
});

// 📦 Bulk Add Placeholder
bulkAddBtn.addEventListener("click", () => {
  alert("Bulk item upload coming soon (CSV / Excel / Multi-select)");
});
</script>

</body>
</html>
